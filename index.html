<!DOCTYPE html>
<html lang="es=MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/style.css">
    <title>Encriptador de Texto</title>
</head>
<body>
    <header>
            <section class="presentacion__contenido">
                <main class="principal">
                <h1 class="presentacion__contenido__contenido"></h1>
                <p class="parrafo__principal"></p>
                <input type="text" class="input__texto" placeholder="Ingresar texto">
                <p class="parrafo__secundario">No se aceptan mayusculas ni caracteres especiales</p>
                <button class="botones_estilo">Encriptar</button>
                <button class="botones_estilo">Desencriptar</button>
                <textarea type="text" class="salida__texto" placeholder="El texto encriptado/desencriptado estara aca"></textarea>
            </section>
        </main>
    </header>
    <img class="imagen__logo" src="img/Encrypter_Easy_logo.png">
    <footer></footer>
</body>
<script src="app.js"></script>
</html>
